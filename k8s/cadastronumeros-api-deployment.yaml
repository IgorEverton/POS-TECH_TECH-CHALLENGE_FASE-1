apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose.exe convert -f docker-compose.yml -o .
    kompose.image-pull-policy: Never
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: cadastronumeros-api
  name: cadastronumeros-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: cadastronumeros-api
  template:
    metadata:
      annotations:
        kompose.cmd: kompose.exe convert -f docker-compose.yml -o .
        kompose.image-pull-policy: Never
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: cadastronumeros-api
    spec:
      containers:
        - env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: RabbitMQ__HostName
              value: rabbitmq-service.default.svc.cluster.local
            - name: RabbitMQ__Password
              value: guest
            - name: RabbitMQ__UserName
              value: guest
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sql-server-service.default.svc.cluster.local;Database=CadastroNumerosDB;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;Connection Timeout=30;"
          image: cadastronumeros-api:latest
          imagePullPolicy: Never
          name: cadastronumeros-api
      restartPolicy: Always
