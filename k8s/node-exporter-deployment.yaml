apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose.exe convert -f docker-compose.yml -o k8s/
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: node-exporter
  name: node-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: node-exporter
  template:
    metadata:
      annotations:
        kompose.cmd: kompose.exe convert -f docker-compose.yml -o k8s/
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: node-exporter
    spec:
      containers:
        - image: quay.io/prometheus/node-exporter:latest
          name: node-exporter
          ports:
            - containerPort: 9100
              protocol: TCP
      restartPolicy: Always
