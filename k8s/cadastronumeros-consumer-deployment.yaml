apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose.exe convert -f docker-compose.yml -o k8s/
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: cadastronumeros-consumer
  name: cadastronumeros-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: cadastronumeros-consumer
  template:
    metadata:
      annotations:
        kompose.cmd: kompose.exe convert -f docker-compose.yml -o k8s/
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: cadastronumeros-consumer
    spec:
      containers:
        - env:
            - name: RabbitMQ__HostName
              value: rabbitmq
            - name: RabbitMQ__Password
              value: guest
            - name: RabbitMQ__UserName
              value: guest
          image: cadastronumeros-consumer:local
          name: cadastronumeros-consumer
      restartPolicy: Always
